name: 'Find workflows'
author: 'EnricoMi'
description: 'A GitHub Action to find workflows matching a query'

inputs:
  url:
    description: 'GitHub API URL'
    required: true
  query:
    description: 'Query to find workflows'
    required: true
outputs:
  total_workflows:
    description: 'Total number of workflows'
    value: ${{ steps.workflows.outputs.total }}

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade --force --no-cache-dir pip
        pip install --force --no-cache-dir -r ${{ github.action_path }}/requirements.txt
        pip freeze | sort

    - name: Find workflows
      id: workflows
      env:
        GITHUB_TOKEN: ${{ github.token }}
        SCRIPT_URL: ${{ inputs.url }}
        SCRIPT_QUERY: ${{ inputs.query }}
      shell: bash
      run: |
        python ${{ github.action_path }}/script.py "$SCRIPT_URL" "$SCRIPT_QUERY"

branding:
  icon: 'download-cloud'
  color: 'green'
